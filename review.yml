sources:
  - url: https://docs.complyadvantage.com/
    type: Documentation
    note: API reference introduction - regional base URLs, Token auth header, 600/300 per-minute rate limits, exponential backoff guidance. No WebSocket mentioned.
  - url: https://docs.complyadvantage.com/api-docs/
    type: APIReference
    note: Full classic API reference - searches, monitored searches, comments, tags, users, references, webhooks, pagination, match types.
  - url: https://docs.mesh.complyadvantage.com/
    type: Documentation
    note: Mesh platform API - OAuth2 bearer auth (24h tokens), customers, screening, cases, alerts, transactions, notifications, admin. REST plus webhooks; no WebSocket.
  - url: https://complyadvantage.com/pricing/
    type: Plans
    note: Starter Plan from $99/month (100-2,000 monitored entities, self-serve, API included) and custom-priced Enterprise; ComplyLaunch free startup program.
  - url: https://github.com/complyadvantage
    type: GitHubOrganization
    note: Company GitHub organization.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Both public API surfaces (classic
    screening API and the Mesh platform API) are request/response REST over
    HTTPS, with outbound webhooks as the only push mechanism. No AsyncAPI
    document was created because there is no server-push transport on a
    connected client to model.

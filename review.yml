    - PATCH  https://api.complyadvantage.com/searches/{id}
    - PATCH  https://api.complyadvantage.com/searches/{id}/entities
    - DELETE https://api.complyadvantage.com/searches/{id}
    - POST   https://api.complyadvantage.com/searches/references
    - GET    https://api.complyadvantage.com/searches/{id}/monitors
    - PATCH  https://api.complyadvantage.com/searches/{id}/monitors
    - PATCH  https://api.complyadvantage.com/searches/{id}/search-profile
    - GET    https://api.complyadvantage.com/searches/{id}/monitor/differences
    - POST   https://api.complyadvantage.com/searches/{id}/monitor/acknowledge
    - POST   https://api.complyadvantage.com/searches/{id}/comments
    - GET    https://api.complyadvantage.com/searches/{id}/comments

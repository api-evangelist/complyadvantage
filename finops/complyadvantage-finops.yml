meters:
- name: monitored_entities
  description: Customers and companies kept under ongoing monitoring; the Starter Plan allowance (100-2,000) is the primary price driver, with overages billed the next cycle.
  unit: entities
  aggregation: max
  dimensions:
  - account
  - client_ref
- name: screening_searches
  description: One-off screening searches created via POST /searches; included in the subscription on published plans, volume-negotiated on enterprise agreements.
  unit: searches
  aggregation: sum
  dimensions:
  - account
  - assignee
  - client_ref
- name: monitoring_updates
  description: Monitored-search re-screens and change notifications generated as sanctions, PEP, and adverse media data changes.
  unit: updates
  aggregation: sum
  dimensions:
  - account
  - search
- name: transactions_screened
  description: Payments screened and transactions monitored on the enterprise Mesh platform (not available on Starter).
  unit: transactions
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track monitored-entity counts against your plan allowance and tag searches with client_ref so screening volume maps to customers and products.
- name: Allocation
  description: Use tags and client references to attribute screening and monitoring activity to teams, products, or business lines.
- name: Optimization
  description: Stop monitoring on offboarded customers to reclaim allowance, whitelist recurring false positives to cut analyst rework, and use webhooks instead of polling to stay under rate limits.
- name: Accountability
  description: Review monitored-entity growth monthly against the allowance tier and renegotiate before overages accumulate; assign case owners so match decisions are audited.

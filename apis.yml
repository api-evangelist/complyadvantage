aid: complyadvantage
url: https://raw.githubusercontent.com/api-evangelist/complyadvantage/refs/heads/main/apis.yml
name: ComplyAdvantage
kind: company
description: >-
  ComplyAdvantage provides AI-driven anti-money laundering (AML) and financial
  crime risk detection - screening people and companies against sanctions and
  watchlists, politically exposed persons (PEPs and RCAs), and adverse media,
  with ongoing monitoring that alerts you when a customer's risk profile
  changes. The REST API (api.complyadvantage.com, with US and APAC regional
  bases) exposes searches, monitored searches, case management, comments, tags,
  and users with api-key auth, plus webhooks for match and monitoring updates.
  The newer Mesh platform API adds customer lifecycle screening, cases and
  alerts, transaction monitoring, and fraud detection workflows. Used by banks,
  fintechs, payments, and crypto firms for KYC/AML compliance, sanctions
  screening, and fraud prevention.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Anti-Money Laundering

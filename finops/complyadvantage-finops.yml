description: >-
  FinOps view of ComplyAdvantage spend. The self-serve Starter Plan is a
  monthly subscription (from $99/month) sized by a monitored-entity allowance
  of 100 to 2,000 entities - the dominant cost driver is how many customers
  you keep under ongoing monitoring, with overages above the allowance charged
  in the next billing cycle. Enterprise agreements (contact sales) cover
  higher volumes plus payments screening and transaction monitoring, typically
  negotiated on screening and monitoring volume. One-off screening searches,
  monitoring re-screens, and API calls all draw on the same subscription
  rather than being metered per call on the published plans.
notes: >-
  Per-tier Starter prices and enterprise per-screening rates are not
  reconciled here; verify on the pricing page or in your order form. The
  ComplyLaunch program provides free access for qualifying early-stage
  startups.
